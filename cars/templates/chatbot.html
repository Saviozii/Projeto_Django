{% load static %}

<!-- ── CHATBOT FLUTUANTE ── -->
<style>
    .cb-btn {
        position: fixed; bottom: 2rem; right: 2rem; z-index: 900;
        width: 56px; height: 56px;
        background: #e8ff00; border: none; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: transform 0.2s, background 0.2s;
        box-shadow: 0 4px 24px rgba(232,255,0,0.25);
    }
    .cb-btn:hover { transform: scale(1.08); background: #d4e800; }
    .cb-btn svg { width: 24px; height: 24px; stroke: #000; fill: none; transition: opacity 0.2s; }
    .cb-btn .icon-open  { opacity: 1; position: absolute; }
    .cb-btn .icon-close { opacity: 0; position: absolute; }
    .cb-btn.active .icon-open  { opacity: 0; }
    .cb-btn.active .icon-close { opacity: 1; }

    .cb-window {
        position: fixed; bottom: 6rem; right: 2rem; z-index: 899;
        width: 380px; height: 560px;
        background: #0a0a0a;
        border: 1px solid #1e1e1e;
        display: flex; flex-direction: column;
        transform: scale(0.92) translateY(20px);
        opacity: 0; pointer-events: none;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        transform-origin: bottom right;
    }

    .cb-window.open {
        transform: scale(1) translateY(0);
        opacity: 1; pointer-events: all;
    }

    /* header */
    .cb-header {
        padding: 1rem 1.25rem;
        border-bottom: 1px solid #1e1e1e;
        display: flex; align-items: center; justify-content: space-between;
        flex-shrink: 0;
    }

    .cb-header-left { display: flex; align-items: center; gap: 0.75rem; }

    .cb-avatar {
        width: 34px; height: 34px;
        background: #e8ff00;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
    }
    .cb-avatar svg { width: 16px; height: 16px; stroke: #000; fill: none; }

    .cb-name {
        font-family: 'Bebas Neue', cursive;
        font-size: 1rem; letter-spacing: 0.08em; color: #f0ede8;
        line-height: 1;
    }
    .cb-status {
        font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase;
        color: #555; display: flex; align-items: center; gap: 0.35rem; margin-top: 0.15rem;
    }
    .cb-status-dot {
        width: 5px; height: 5px; border-radius: 50%; background: #4ade80;
        animation: cbPulse 2s infinite;
    }
    @keyframes cbPulse {
        0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
    }

    /* provider toggle */
    .cb-provider {
        display: flex; gap: 1px; background: #1e1e1e; padding: 1px;
    }
    .cb-provider-btn {
        font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase;
        padding: 0.3rem 0.6rem; border: none; cursor: pointer;
        background: transparent; color: #555;
        transition: all 0.15s; font-family: 'DM Sans', sans-serif;
    }
    .cb-provider-btn.active { background: #e8ff00; color: #000; }

    /* messages */
    .cb-messages {
        flex: 1; overflow-y: auto; padding: 1rem;
        display: flex; flex-direction: column; gap: 0.75rem;
        scrollbar-width: thin; scrollbar-color: #1e1e1e transparent;
    }

    .cb-messages::-webkit-scrollbar { width: 3px; }
    .cb-messages::-webkit-scrollbar-track { background: transparent; }
    .cb-messages::-webkit-scrollbar-thumb { background: #1e1e1e; }

    .cb-msg {
        display: flex; gap: 0.5rem; align-items: flex-end;
        animation: cbMsgIn 0.25s ease both;
    }

    @keyframes cbMsgIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .cb-msg.user { flex-direction: row-reverse; }

    .cb-msg-avatar {
        width: 24px; height: 24px; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        font-size: 0.65rem; font-family: 'Bebas Neue', cursive; letter-spacing: 0.05em;
    }

    .cb-msg.bot .cb-msg-avatar { background: #e8ff00; color: #000; }
    .cb-msg.user .cb-msg-avatar { background: #1e1e1e; color: #888; }

    .cb-msg-bubble {
        max-width: 82%; padding: 0.65rem 0.9rem;
        font-size: 0.82rem; line-height: 1.6;
        font-family: 'DM Sans', sans-serif;
    }

    .cb-msg.bot .cb-msg-bubble {
        background: #111; border: 1px solid #1e1e1e;
        color: #c8c5c0; border-bottom-left-radius: 0;
    }

    .cb-msg.user .cb-msg-bubble {
        background: #e8ff00; color: #000;
        border-bottom-right-radius: 0;
    }

    /* typing indicator */
    .cb-typing {
        display: flex; align-items: center; gap: 4px;
        padding: 0.65rem 0.9rem;
        background: #111; border: 1px solid #1e1e1e;
        width: fit-content;
    }
    .cb-typing span {
        width: 5px; height: 5px; border-radius: 50%; background: #555;
        animation: cbTyping 1.2s infinite;
    }
    .cb-typing span:nth-child(2) { animation-delay: 0.2s; }
    .cb-typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes cbTyping {
        0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
        30% { transform: translateY(-5px); opacity: 1; }
    }

    /* suggestions */
    .cb-suggestions {
        padding: 0 1rem 0.75rem;
        display: flex; gap: 0.4rem; flex-wrap: wrap; flex-shrink: 0;
    }
    .cb-suggestion {
        font-size: 0.68rem; letter-spacing: 0.06em;
        padding: 0.3rem 0.7rem;
        border: 1px solid #1e1e1e; background: transparent;
        color: #555; cursor: pointer;
        font-family: 'DM Sans', sans-serif;
        transition: all 0.15s;
    }
    .cb-suggestion:hover { border-color: #e8ff00; color: #e8ff00; }

    /* input */
    .cb-input-area {
        border-top: 1px solid #1e1e1e;
        padding: 0.75rem 1rem;
        display: flex; gap: 0.5rem; align-items: flex-end;
        flex-shrink: 0;
    }

    .cb-input {
        flex: 1; background: #111; border: 1px solid #1e1e1e;
        color: #f0ede8; font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
        padding: 0.6rem 0.85rem; outline: none; resize: none;
        max-height: 100px; min-height: 38px;
        transition: border-color 0.2s;
        scrollbar-width: none;
    }
    .cb-input:focus { border-color: #e8ff00; }
    .cb-input::placeholder { color: #3a3a3a; }

    .cb-send {
        width: 38px; height: 38px; flex-shrink: 0;
        background: #e8ff00; border: none; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: background 0.15s, transform 0.15s;
    }
    .cb-send:hover { background: #d4e800; transform: scale(1.05); }
    .cb-send:disabled { background: #1e1e1e; cursor: not-allowed; transform: none; }
    .cb-send svg { width: 14px; height: 14px; stroke: #000; fill: none; }
    .cb-send:disabled svg { stroke: #333; }

    @media (max-width: 480px) {
        .cb-window { width: calc(100vw - 2rem); right: 1rem; bottom: 5rem; }
        .cb-btn { right: 1rem; bottom: 1rem; }
    }
</style>

<!-- BOTÃO FLUTUANTE -->
<button class="cb-btn" id="cbBtn" onclick="toggleChat()">
    <svg class="icon-open" viewBox="0 0 24 24" stroke-width="2">
        <path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1l2-3h8l2 3h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2"/>
        <circle cx="7.5" cy="14.5" r="2.5"/>
        <circle cx="16.5" cy="14.5" r="2.5"/>
    </svg>
    <svg class="icon-close" viewBox="0 0 24 24" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
</button>

<!-- JANELA DO CHAT -->
<div class="cb-window" id="cbWindow">

    <!-- HEADER -->
    <div class="cb-header">
        <div class="cb-header-left">
            <div class="cb-avatar">
                <svg viewBox="0 0 24 24" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
                </svg>
            </div>
            <div>
                <div class="cb-name">Garagem IA</div>
                <div class="cb-status">
                    <div class="cb-status-dot"></div>
                    online
                </div>
            </div>
        </div>

        <div class="cb-provider">
            <button class="cb-provider-btn active" id="btnOllama" onclick="setProvider('ollama')">Local</button>
            <button class="cb-provider-btn" id="btnGemini" onclick="setProvider('gemini')">Gemini</button>
        </div>
    </div>

    <!-- MENSAGENS -->
    <div class="cb-messages" id="cbMessages">
        <div class="cb-msg bot">
            <div class="cb-msg-avatar">IA</div>
            <div class="cb-msg-bubble">
                Olá! Sou o assistente da Savi Garagem. Me conta o que você procura — tipo, orçamento, uso — e eu te indico os melhores carros do catálogo. 🚗
            </div>
        </div>
    </div>

    <!-- SUGESTÕES -->
    <div class="cb-suggestions" id="cbSuggestions">
        <button class="cb-suggestion" onclick="sendSuggestion('Quero um carro econômico até R$50mil')">Econômico até R$50mil</button>
        <button class="cb-suggestion" onclick="sendSuggestion('Qual o carro mais barato disponível?')">Mais barato</button>
        <button class="cb-suggestion" onclick="sendSuggestion('Quero um SUV espaçoso para família')">SUV familiar</button>
        <button class="cb-suggestion" onclick="sendSuggestion('Carros esportivos disponíveis')">Esportivos</button>
    </div>

    <!-- INPUT -->
    <div class="cb-input-area">
        <textarea
            class="cb-input" id="cbInput"
            placeholder="Descreva o carro ideal..."
            rows="1"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"
        ></textarea>
        <button class="cb-send" id="cbSend" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" stroke-width="2.5">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
        </button>
    </div>
</div>

<script>
    let provider  = 'ollama';
    let history   = [];
    let isLoading = false;

    const CHATBOT_URL = "{% url 'chatbot' %}";
    const CSRF_TOKEN  = "{{ csrf_token }}";

    function toggleChat() {
        const btn = document.getElementById('cbBtn');
        const win = document.getElementById('cbWindow');
        btn.classList.toggle('active');
        win.classList.toggle('open');
        if (win.classList.contains('open')) {
            setTimeout(() => document.getElementById('cbInput').focus(), 300);
        }
    }

    function setProvider(p) {
        provider = p;
        document.getElementById('btnOllama').classList.toggle('active', p === 'ollama');
        document.getElementById('btnGemini').classList.toggle('active', p === 'gemini');
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 100) + 'px';
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function sendSuggestion(text) {
        document.getElementById('cbInput').value = text;
        document.getElementById('cbSuggestions').style.display = 'none';
        sendMessage();
    }

    function addMessage(text, role) {
        const msgs = document.getElementById('cbMessages');
        const div  = document.createElement('div');
        div.className = `cb-msg ${role}`;

        const avatar = document.createElement('div');
        avatar.className = 'cb-msg-avatar';
        avatar.textContent = role === 'bot' ? 'IA' : 'EU';

        const bubble = document.createElement('div');
        bubble.className = 'cb-msg-bubble';
        bubble.textContent = text;

        div.appendChild(avatar);
        div.appendChild(bubble);
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
        return div;
    }

    function showTyping() {
        const msgs = document.getElementById('cbMessages');
        const div  = document.createElement('div');
        div.className = 'cb-msg bot'; div.id = 'cbTyping';

        const avatar = document.createElement('div');
        avatar.className = 'cb-msg-avatar'; avatar.textContent = 'IA';

        const typing = document.createElement('div');
        typing.className = 'cb-typing';
        typing.innerHTML = '<span></span><span></span><span></span>';

        div.appendChild(avatar); div.appendChild(typing);
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
    }

    function removeTyping() {
        const t = document.getElementById('cbTyping');
        if (t) t.remove();
    }

    async function sendMessage() {
        if (isLoading) return;
        const input = document.getElementById('cbInput');
        const text  = input.value.trim();
        if (!text) return;

        // limpa input
        input.value = '';
        input.style.height = 'auto';
        document.getElementById('cbSuggestions').style.display = 'none';

        // adiciona mensagem do usuário
        addMessage(text, 'user');
        history.push({ role: 'user', content: text });

        // loading
        isLoading = true;
        document.getElementById('cbSend').disabled = true;
        showTyping();

        try {
            const res = await fetch(CHATBOT_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': CSRF_TOKEN,
                },
                body: JSON.stringify({
                    message:  text,
                    history:  history.slice(-10), // últimas 10 mensagens
                    provider: provider,
                }),
            });

            const data = await res.json();
            removeTyping();

            const resposta = data.response || 'Erro ao obter resposta.';
            addMessage(resposta, 'bot');
            history.push({ role: 'assistant', content: resposta });

        } catch (err) {
            removeTyping();
            addMessage('Erro de conexão. Tente novamente.', 'bot');
        } finally {
            isLoading = false;
            document.getElementById('cbSend').disabled = false;
            document.getElementById('cbInput').focus();
        }
    }
</script>
